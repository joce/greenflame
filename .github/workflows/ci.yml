name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel an in-progress run for the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Build & Test matrix: MSVC Debug/Release + Clang-cl Debug/Release
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test (${{ matrix.preset }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - x64-debug
          - x64-release
          - x64-debug-clang
          - x64-release-clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Puts cl.exe / clang-cl.exe and the Windows SDK headers in PATH / env.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # Ninja is a single-config generator, so -C <config> is not required.
      - name: Test
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

  # ---------------------------------------------------------------------------
  # clang-format: fail if any source file is not already correctly formatted.
  # No reformatting is performed; the working tree is left untouched.
  # ---------------------------------------------------------------------------
  clang-format:
    name: clang-format
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check formatting
        shell: bash
        run: |
          find src tests \( -name "*.cpp" -o -name "*.h" \) -print0 \
            | xargs -0 clang-format --dry-run --Werror

  # ---------------------------------------------------------------------------
  # clang-tidy: static analysis against the Clang-debug compilation database.
  # The configure step re-generates compile_commands.json; no full build is
  # needed.  MSVC dev env is required so clang-tidy can resolve Windows SDK
  # and MSVC-runtime headers referenced in compile commands.
  # ---------------------------------------------------------------------------
  clang-tidy:
    name: clang-tidy
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (emit compile_commands.json)
        run: cmake --preset x64-debug-clang

      - name: Run clang-tidy
        shell: bash
        run: |
          find src tests -name "*.cpp" -print0 \
            | xargs -0 clang-tidy -p build/x64-debug-clang
